<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hold Your Ground</title>
  <link rel="stylesheet" href="/holdyourground/style.css?v=1">
</head>
<body>
  <div id="wrapper">
    <canvas id="canvas"></canvas>

    <div id="menu" class="overlay">
      <h1>Hold Your Ground</h1>
      <p class="subtitle">Last circle standing wins</p>
      <input type="text" id="nameInput" placeholder="Enter your name" maxlength="16" autofocus>
      <button id="joinBtn">Play</button>
      <p id="errorMsg" class="error"></p>
    </div>

    <div id="eliminated" class="overlay hidden">
      <h1>Eliminated!</h1>
      <p id="elimKills">You were pushed out.</p>
      <button id="respawnBtn">Respawn</button>
    </div>

    <div id="hud" class="hud hidden">
      <div class="lb-title">Leaderboard</div>
      <div id="lbEntries"></div>
    </div>

    <div id="hotbarInventory" class="hotbar hidden"></div>

    <div id="settingsBtn" class="settings-btn hidden">
      <img src="/images/settingsgear.png" alt="Settings">
    </div>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button id="settingsClose" class="settings-close">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-row">
          <span class="settings-label">Fullscreen Mode</span>
          <label class="toggle-switch">
            <input type="checkbox" id="fullscreenToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <script src="/holdyourground/shared/data.js?v=1"></script>
  <script src="https://server.iolegends.com/socket.io/socket.io.js"></script>
  <script type="module" src="/holdyourground/game.js?v=1"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</body>
</html>
